first_time_setup:
  title: "First Time Setup"
  welcome_heading: "Maligayang Pagdating"
  welcome_content: >-
    Na-install na ang Hachimi! Gagabayan ka nito sa inisyal na pag-set up.
    Kung hindi ka interesado sa translation na feature, maaari mo itong laktawan
    sa pamamagitan ng pagsara nito.


    DISCLAIMER: Isang proyekto na pinangungunahan ng komunidad ang Hachimi. Ginawa
    ng mga iba't ibang mga kontribyutor ang mga translator. Hindi ito binuo o ineendorso
    ng Cygames, Inc., at lumalabag ito sa Mga Tuntunin sa Serbisyo. Sa pamamagitan ng pagpatuloy,
    tinatanggap mo na gagamitin mo ito sa iyong sariling peligro.
  translation_repo_heading: "Repo ng translations"
  select_translation_repo: "Pumili ng translations repo:"
  no_compatible_repo: "Walang mga repo na compatible sa game version na ito."
  skip_translation: "Laktawan ang translations"
  complete_heading: "Tapos na!"
  complete_content: >-
    Pindutin ang "Tapos na" para i-save ang configuration.
    Kung pumili ka ng translation repo, isasagawa ang pagsusuri ng update,
    na magpo-prompt sa iyo na i-download ang bagong translation data.

