first_time_setup:
  title: "Configuração inicial"
  welcome_heading: "Bem-vindo"
  welcome_content: >-
    O Hachimi foi instalado! Esta tela irá guiá-lo através do processo inicial de instalação.
    Se não estiver interessado em utilizar as funcionalidades de tradução, pode ignorá-las fechando esta janela.


    AVISO: O Hachimi é um projeto desenvolvido pela comunidade. Todas as traduções foram feitas por vários contribuidores.
    Este projeto não é desenvolvido e nem apoiado pela Cygames, Inc., e viola os termos de serviço do jogo. Ao continuar,
    você está aceitando os riscos envolvidos.
