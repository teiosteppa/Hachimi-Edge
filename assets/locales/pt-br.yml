  skip_translation: "Ignorar traduções."
  complete_heading: "Feito!"
  complete_content: >-
    Clique em Finalizar para salvar as configurações.
    Se você tiver escolhido um repositório de tradução, uma busca por atualizações será realizada
    e em seguida será perguntando se você deseja baixar os dados de tradução disponíveis.

