  content: "Versi terbaru Hachimi telah tersedia (%{version}). Apa kamu ingin memasangnya? Game akan dimulai ulang saat proses penerapan pembaruan."
  android_content: |
    Pembaruan Hachimi Edge tersedia (%{version}). Apakah kamu ingin memasangnya?

    Ketuk "Ya" untuk membuka UmaPatcher Edge dan patch ulang game kamu.
    (Tidak perlu mengunduh ulang data game atau APK, kamu hanya perlu patch lagi seperti biasanya karena UmaPatcher Edge selalu mengunduh versi Hachimi Edge terbaru.)

updating_dialog:
  title: "Memperbarui"
  content: "Mengunduh pembaruan, game akan dimulai ulang..."

steam_overlay_conflict_dialog:
  title: "Peringatan"
  content: >-
    Pembelian mungkin tidak bekerja saat overlay Hachimi menyala. Jika overlay Steam muncul saat melakukan 
    transaksi, abaikan pesan ini dan klik tombol Tidak. Jika tidak berfungsi, klik tombol Ya untuk 
    mematikan sementara overlay Hachimi. Game akan dimulai ulang, kemudian overlay Hachimi akan dimatikan dan kamu
    bisa melakukan pembelian lagi, setelah itu mulai ulang game lagi untuk menyalakan kembali overlay Hachimi.

