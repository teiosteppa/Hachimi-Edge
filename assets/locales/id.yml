first_time_setup:
  title: "Setup Pertama Kali"
  welcome_heading: "Selamat Datang"
  welcome_content: >-
    Hachimi telah terpasang! Ini adalah proses pengaturan awal.
    Jika kamu tidak tertarik pada fitur translasi, kamu bisa melewatinya dengan menutup dialog ini.


    SANGGAHAN (DISCLAIMER):
    Hachimi adalah proyek komunitas. Translasi yang tersedia adalah hasil kontribusi dari beragam komunitas.
    Proyek ini tidak dibuat/didukung oleh Cygames, Inc., dan berpotensi melanggar S&K game ini. Kamu dianggap
    bersedia menerima segala risiko yang ada apabila melanjutkan.
  translation_repo_heading: "Repositori Translasi"
  select_translation_repo: "Pilih repositori translasi:"
  no_compatible_repo: "Tidak ada repositori yang didukung oleh versi game ini"
  skip_translation: "Lewati translasi."
  complete_heading: "Selesai!"
  complete_content: >-
    Klik Selesai untuk menyimpan konfigurasi.
    Jika kamu ingin menggunakan fitur translasi, dialog cek pembaruan akan muncul dan mengunduh data translasi.

